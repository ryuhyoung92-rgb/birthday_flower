<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>나의 탄생화 찾기</title>
    <link rel="shortcut icon" href="./images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
</head>
<body>
    <div id="wrap">
        <div id="title">
            <p>The Flower of My Birth Day</p>
            <h1>나의 <span>탄생화</span> 찾기</h1>
        </div>
        <form action="#" method="get" id="birthday_frm">
            <input autofocus type="text" name="user_year" id="user_year" placeholder="year">
            <!-- placeholder : 안내 / value : 초기값 -->
            <input type="text" name="user_month" id="user_month" placeholder="month">
            <input type="text" name="user_day" id="user_day" placeholder="day">
            <button type="button" id="birthday_btn">나의 꽃과 꽃말 만나기</button>
            <!-- <button onclick="window.location.href='./result.html'" type="button" id="birthday_btn">나의 꽃과 꽃말 만나기</button> -->
        </form>
        <p class="error_msg1 error_msg">태어난 년도를 입력해주세요.</p>
        <p class="error_msg2 error_msg">태어난 달을 입력해주세요.</p>
        <p class="error_msg3 error_msg">태어난 날을 입력해주세요.</p>
        <p class="error_msg4 error_msg">숫자로만 입력해주세요.</p>
        <!-- <ol id="contents">
            <li class="y">year</li>
            <li class="m">month</li>
            <li class="d">day</li>
        </ol>
        <a href="./result.html" class="birthday_btn">나의 꽃과 꽃말 만나기</a> -->
    </div>
</body>
</html>
